<script>
    let arr = [10, 20, 30, 40];

    // splice: 1.only delete   2.only add   3.both delete & add
    // splice(index,#elements to remove, elements to add)
    arr.splice(1, 2);  // 1.only delete 
    console.log(arr); //  [10, 40]

    arr.splice(1, 0, 20, 30); // 1.only add 
    console.log(arr);       // [10, 20, 30, 40];

    arr.splice(1, 2, 25, 35);
    console.log(arr);  // [10, 25, 35, 40];
</script>
