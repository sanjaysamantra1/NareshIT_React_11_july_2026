<script>
    var a = 10;
    let b = 20;
    const c = 30;
    console.log(`a is:${a}`)
    console.log(`b is:${b}`)
    console.log(`c is:${c}`)

    var a = 100;  // re-declaration in the same scope is allowed
    console.log(`a is:${a}`);

    let b = 200;  //  Identifier 'b' has already been declared 
    console.log(`b is:${b}`); 
</script>
